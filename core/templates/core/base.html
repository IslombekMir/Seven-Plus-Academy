<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Seven Plust{% endblock title %}</title>
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/css/tom-select.css"
  />
  <script src="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/js/tom-select.complete.min.js"></script>
  {% load static %}
  <link rel="stylesheet" href="{% static 'core/css/base.css' %}">
  <link rel="stylesheet" href="{% static 'core/css/component.css' %}">
  <link rel="stylesheet" href="{% static 'core/css/pages.css' %}">
  {% block style %}{% endblock %}
</head>
<body class="theme-{{ request.user.settings.theme|default:'LIGHT'|lower }}">

  <div class="svgs">
    <svg style="display:none" xmlns="http://www.w3.org/2000/svg">
      <symbol id="icon-removed-users" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-label="Removed users">
        <polyline points="3 6 5 6 21 6"/>
        <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
        <path d="M10 11v6"/>
        <path d="M14 11v6"/>
        <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
      </symbol>
    </svg>

    <svg xmlns="http://www.w3.org/2000/svg" style="display:none;">
      <symbol id="icon-edit" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
      </symbol>

      <symbol id="icon-trash" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="3 6 5 6 21 6"/>
        <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
        <path d="M10 11v6"/>
        <path d="M14 11v6"/>
        <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
      </symbol>
    </svg>
  </div>

  <header style="background: var(--surface); border-bottom: 1px solid var(--border); box-shadow: var(--shadow);">
    <nav style="
      max-width: var(--max-width);
      margin: 0 auto;
      padding: var(--space-3) var(--space-4);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      min-height: 56px;
    ">
      <a href="{% url 'core:index' %}" class="site-brand" aria-label="Seven Plus home">
        <svg class="site-brand__logo" viewBox="0 0 680 180" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <style>
              .blue { stroke: #29ABE2; fill: none; stroke-width: 5; stroke-linecap: square; stroke-linejoin: miter; }
              .black { stroke: #1a1a1a; fill: none; stroke-width: 5; stroke-linecap: square; stroke-linejoin: miter; }
              .sub-blue { font-family: Arial, sans-serif; font-size: 18px; fill: #29ABE2; font-weight: 600; letter-spacing: 3px; }
              .sub-black { font-family: Arial, sans-serif; font-size: 18px; fill: #1a1a1a; font-weight: 400; letter-spacing: 3px; }
            </style>

            <!-- S -->
            <polyline class="blue" points="155,70 115,70 115,100 155,100 155,130 115,130"/>

            <!-- E -->
            <polyline class="blue" points="175,130 175,70 215,70"/>
            <line class="blue" x1="175" y1="100" x2="210" y2="100"/>
            <line class="blue" x1="175" y1="130" x2="215" y2="130"/>

            <!-- V (stylized as a downward pointing triangle/chevron: the "7" shape) -->
            <polyline class="black" points="230,70 270,70 250,130"/>

            <!-- E -->
            <polyline class="blue" points="285,130 285,70 325,70"/>
            <line class="blue" x1="285" y1="100" x2="320" y2="100"/>
            <line class="blue" x1="285" y1="130" x2="325" y2="130"/>

            <!-- N -->
            <polyline class="blue" points="345,130 345,70 385,130 385,70"/>

            <!-- PLUS ACADEMY subtitle -->
            <text x="272" y="165" text-anchor="middle" class="sub-blue">PLUS</text>
            <text x="370" y="165" text-anchor="middle" class="sub-black">ACADEMY</text>
          </svg>
      </a>

      <div class="nav-actions">
        {% if user.is_authenticated %}
          <a href="{% url 'users:profile' %}" class="nav-link">Profile</a>
          <a href="{% url 'users:logout' %}" class="button">Logout</a>
        {% else %}
          <a href="{% url 'users:login' %}" class="button">Login</a>
        {% endif %}
      </div>
    </nav>
  </header>

  <main style="background-color:var(--bg)">
    <div class="page-wrap">
      {% block content %}{% endblock content %}
    </div>
  </main>

  <footer style="border-top: 1px solid var(--border); background: var(--surface);">
    <div style="max-width: var(--max-width); margin: 0 auto; padding: var(--space-4); color: var(--muted); text-align: center;">

      <p class="site-footer__phone">
        <a href="tel:+998901234567" class="footer-link">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
          </svg>
          +998 90 123 45 67
        </a>
      </p>

      <nav class="site-footer__links" aria-label="Footer social links">
        <a href="https://t.me/Sevenplus_academy" class="footer-link" target="_blank" rel="noopener noreferrer">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M21.2 5L2 12.5l7 1M21.2 5l-5.4 14-4.8-6.5M21.2 5L9 13.5m0 0v5l3.2-3"/>
          </svg>
          Almalyk
        </a>
        <a href="https://t.me/humosevenplus" class="footer-link" target="_blank" rel="noopener noreferrer">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M21.2 5L2 12.5l7 1M21.2 5l-5.4 14-4.8-6.5M21.2 5L9 13.5m0 0v5l3.2-3"/>
          </svg>
          Buka
        </a>
        <a href="https://www.instagram.com/sevenplus_lc?igsh=YnZ3YTZoZ2d4MDRq" class="footer-link" target="_blank" rel="noopener noreferrer">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <rect x="2" y="2" width="20" height="20" rx="5"/>
            <circle cx="12" cy="12" r="4.5"/>
            <circle cx="17.5" cy="6.5" r="0.5" fill="currentColor" stroke="none"/>
          </svg>
          Instagram
        </a>
        <a href="https://youtube.com/@sevenplusacademy?si=Ek8qY_T3dDIjPzfv" class="footer-link" target="_blank" rel="noopener noreferrer">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <rect x="2" y="5" width="20" height="14" rx="4"/>
            <polygon points="10,9 16,12 10,15" fill="currentColor" stroke="none"/>
          </svg>
          YouTube
        </a>
      </nav>

    </div>
  </footer>

</body>
</html>
