<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Seven Plust{% endblock title %}</title>
  {% load static %}
  <link rel="stylesheet" href="{% static 'core/css/base.css' %}">
  <link rel="stylesheet" href="{% static 'core/css/component.css' %}">
  <link rel="stylesheet" href="{% static 'core/css/pages.css' %}">
  {% block style %}{% endblock %}
</head>
<body class="theme-{{ request.user.settings.theme|default:'LIGHT'|lower }}">

  <header style="background: var(--surface); border-bottom: 1px solid var(--border); box-shadow: var(--shadow);">
    <nav style="max-width: var(--max-width); margin: 0 auto; padding: var(--space-3) var(--space-4);">
      <div class="inline-actions" style="justify-content: space-between;">
        <a href="{% url 'core:index' %}" style="font-weight: 700; font-size: 1.1rem; color: var(--text);">My Website</a>
        <div class="inline-actions">
          {% if user.is_authenticated %}
            <a href="{% url 'users:profile' %}">Profile</a>
            <a href="{% url 'users:logout' %}" class="button">Logout</a>
          {% else %}
            <a href="{% url 'users:login' %}" class="button">Login</a>
          {% endif %}
        </div>
      </div>
    </nav>
  </header>

  <main>
    {% block content %}{% endblock content %}
  </main>

  <footer style="border-top: 1px solid var(--border); background: var(--surface); margin-top: var(--space-6);">
    <div style="max-width: var(--max-width); margin: 0 auto; padding: var(--space-4); color: var(--muted); text-align: center;">
      Footer
    </div>
  </footer>

</body>
</html>
