upstream django_app {
    server web:8000;
}

# Serve ACME challenges for Certbot, redirect everything else to HTTPS
server {
    listen 80;
    server_name sevenplusac.uz www.sevenplusac.uz;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
   listen 443 ssl;
   server_name sevenplusac.uz www.sevenplusac.uz;

   ssl_certificate     /etc/letsencrypt/live/sevenplusac.uz/fullchain.pem;
   ssl_certificate_key /etc/letsencrypt/live/sevenplusac.uz/privkey.pem;

   client_max_body_size 20M;

   location /static/ {
       alias /app/staticfiles/;
       expires 30d;
       access_log off;
   }

   location /media/ {
       alias /app/media/;
       expires 30d;
       access_log off;
   }

   location / {
       proxy_pass http://django_app;
       proxy_set_header Host $host;
       proxy_set_header X-Real-IP $remote_addr;
       proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
       proxy_set_header X-Forwarded-Proto $scheme;
   }
}