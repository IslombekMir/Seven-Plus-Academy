{% extends "core/base.html" %}

{% block content %}
<h2>Delete User</h2>
<p>Are you sure you want to delete {{user.username}} - {{ user.get_full_name }} ({{ user.username }})?</p>
<form method="post">
    {% csrf_token %}
    <button type="submit">Yes, delete</button>
    <a href="{% url 'users:users_list' %}">Cancel</a>
</form>
{% endblock %}
