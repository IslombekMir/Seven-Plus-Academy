{% extends "core/base.html" %}

{% block title %}User List{% endblock %}

{% block content %}
<h2>User List</h2>
<ul>
    {% for user in users %}
        <li>{{ user.username }} - {{ user.get_full_name }} ({{ user.role }})</li>
    {% empty %}
        <li>No users available.</li>
    {% endfor %}
</ul>
{% endblock %}
