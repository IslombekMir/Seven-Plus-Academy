{% extends 'core/base.html' %}

{% block title %}Edit Profile — {{ teacher.get_full_name|default:teacher.username }}{% endblock %}

{% block content %}
<div class="form-page">

  <div class="page-header">
    <h1 class="page-title">Edit Profile</h1>
    <p class="page-subtitle">{{ teacher.get_full_name|default:teacher.username }}</p>
  </div>

  <div class="card form-card">
    <form method="post" enctype="multipart/form-data" class="form-grid">
      {% csrf_token %}
      {{ form.as_p }}
      <div class="inline-actions">
        <button type="submit">Save</button>
        <a href="{% url 'users:teachers_list' %}" class="button" style="background:var(--surface-alt);color:var(--text);border-color:var(--border);">Cancel</a>
      </div>
    </form>
  </div>

</div>
{% endblock %}
