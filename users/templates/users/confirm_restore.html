{% extends 'core/base.html' %}

{% block title %}Restore User{% endblock %}

{% block content %}
<div class="confirm-page">
  <div class="page-header">
    <h1 class="page-title">Restore User</h1>
  </div>

  <div class="card confirm-card">
    <p>Restore <span class="danger-text">{{ user.get_full_name }}</span> ({{ user.username }}) to the active users list?</p>

    <form method="post">
      {% csrf_token %}
      <div class="inline-actions">
        <button type="submit">Yes, restore</button>
        <a href="{% url 'users:removed_users' %}" class="button" style="background:var(--surface-alt);color:var(--text);border-color:var(--border);">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
