{% extends 'core/base.html' %}

{% block title %}Remove User{% endblock %}

{% block content %}
<div class="confirm-page">
  <div class="page-header">
    <h1 class="page-title">Remove User</h1>
  </div>

  <div class="card confirm-card">
    <p>
      Are you sure you want to remove
      <span class="danger-text">{{ user.get_full_name }}</span> ({{ user.username }})?
    </p>
    <p>This will set the account as inactive and move it to Removed Users.</p>

    <form method="post">
      {% csrf_token %}
      <div class="inline-actions">
        <button type="submit" style="background:var(--danger);">Yes, remove</button>
        <a href="{% url 'users:users_list' %}" class="button" style="background:var(--surface-alt);color:var(--text);border-color:var(--border);">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
