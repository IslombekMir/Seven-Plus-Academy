name: CI/CD Deployment

on:
  push:
    branches:
      - main
      - master

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build image
        run: |
          docker build \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/academy_web:latest \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/academy_web:${{ github.sha }} .

      - name: Push image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/academy_web:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/academy_web:${{ github.sha }}

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Copy compose file to server
        run: |
          scp -o StrictHostKeyChecking=no docker-compose.yml \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/root/islombek/Seven-Plus-Academy/docker-compose.yml

      - name: Deploy via SSH
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "
            cd /root/islombek/Seven-Plus-Academy &&
            docker compose pull web &&
            docker compose up -d --force-recreate --no-deps web &&
            docker compose up -d --force-recreate --no-deps nginx
          "