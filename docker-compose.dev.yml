version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: academy_db_dev
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    networks:
      - academy_dev_network

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: academy_web_dev
    restart: unless-stopped
    env_file:
      - .env
    command: >
      sh -c "
      python manage.py migrate &&
      python manage.py runserver 0.0.0.0:8000
      "
    depends_on:
      - db
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - media_volume_dev:/app/media
    networks:
      - academy_dev_network

volumes:
  postgres_data_dev:
  media_volume_dev:

networks:
  academy_dev_network:
    driver: bridge
