{% extends 'core/base.html' %}
{% block title %}Create Exam{% endblock %}

{% block content %}
<h2>
    {% if exam %}
        Edit Exam for {{ group.name }}
    {% else %}
        Create Exam for {{ group.name }}
    {% endif %}
</h2>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Save</button>
</form>
{% endblock %}
