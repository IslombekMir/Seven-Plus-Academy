{% extends 'core/base.html' %}

{% block title %}Delete Subject{% endblock %}

{% block content %}
<h2>Delete Subject</h2>

<p>Are you sure you want to delete "{{ subject.name }}"?</p>

<form method="post">
    {% csrf_token %}
    <button type="submit">Delete</button>
    <a href="{% url 'lessons:subjects_list' %}">Cancel</a>
</form>
{% endblock %}
