{% extends 'core/base.html' %}

{% block title %}Delete Subject{% endblock %}

{% block content %}
<div class="confirm-page">

  <div class="page-header">
    <h1 class="page-title">Delete Subject</h1>
  </div>

  <div class="card confirm-card">
    <p>Are you sure you want to delete <span class="danger-text">{{ subject.name }}</span>?</p>
    <form method="post">
      {% csrf_token %}
      <div class="inline-actions">
        <button type="submit" style="background:var(--danger);">Delete</button>
        <a href="{% url 'lessons:subjects_list' %}" class="button" style="background:var(--surface-alt);color:var(--text);border-color:var(--border);">Cancel</a>
      </div>
    </form>
  </div>

</div>
{% endblock %}
