{% extends 'core/base.html' %}

{% block title %}Restore Group{% endblock %}

{% block content %}
<div class="confirm-page">

  <div class="page-header">
    <h1 class="page-title">Restore Group</h1>
  </div>

  <div class="card confirm-card">
    <p>Are you sure you want to restore <span class="danger-text">{{ group.name }}</span>?</p>
    <form method="post">
      {% csrf_token %}
      <div class="inline-actions">
        <button type="submit">Yes, restore</button>
        <a href="{% url 'lessons:removed_groups' %}" class="button" style="background:var(--surface-alt);color:var(--text);border-color:var(--border);">Cancel</a>
      </div>
    </form>
  </div>

</div>
{% endblock %}
