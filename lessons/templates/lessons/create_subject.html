{% extends 'core/base.html' %}

{% block title %}{% trans "Create a Subject" %}{% endblock %}

{% block content %}
<div class="form-page">

  <div class="page-header">
    <h1 class="page-title">{% trans "Create Subject" %}</h1>
  </div>

  <div class="card form-card">
    <form method="post" class="form-grid">
      {% csrf_token %}
      {{ form.as_p }}
      <div>
        <button type="submit">{% trans "Submit" %}</button>
      </div>
    </form>
  </div>

</div>
{% endblock %}
